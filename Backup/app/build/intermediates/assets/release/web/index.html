<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Chat & File Transfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Peer 2 Peer Chat</h1>
            <div id="connection-status" class="status-disconnected">Disconnected</div>
        </header>

        <main>
            <section id="id-section">
                <div class="card">
                    <label>Your ID:</label>
                    <div class="id-display">
                        <span id="local-id">Generating...</span>
                        <button id="copy-id-btn" class="icon-btn">📋</button>
                    </div>
                    <button id="scan-qr-btn" class="primary-btn">Scan QR to Connect</button>
                </div>
            </section>

            <section id="connect-section">
                <div class="card">
                    <label for="remote-id-input">Connect to Peer ID:</label>
                    <div class="input-group">
                        <input type="text" id="remote-id-input" placeholder="Enter Peer ID or use Scan">
                        <button id="connect-btn" class="primary-btn">Connect</button>
                    </div>
                </div>
            </section>

            <section id="chat-section" class="hidden">
                <div id="chat-messages"></div>
                <div id="transfer-progress" class="hidden">
                    <div class="progress-bar"><div id="progress-fill"></div></div>
                    <span id="progress-text">Sending file...</span>
                </div>
                <div id="input-area">
                    <button id="pick-file-btn" class="icon-btn">📎</button>
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-btn" class="primary-btn">Send</button>
                </div>
                <div id="nudge-area">
                    <button id="nudge-btn" class="secondary-btn">Nudge</button>
                </div>
            </section>
        </main>

        <footer>
            <div id="debug-log"></div>
        </footer>
    </div>

    <script src="js/peerjs.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
